<html>
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body>
    <div class="flex items-center justify-center min-h-screen bg-gradient-to-r from-green-200 to-teal-500">
  <div class="bg-white dark:bg-zinc-800 p-8 rounded-lg shadow-lg max-w-md w-full">
    <h2 class="text-center text-2xl font-bold mb-6">REGISTRARSE</h2>
    <form class="space-y-4">
      <div class="relative">
        <input type="text" placeholder="Nombre" class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-teal-500 dark:bg-zinc-700 dark:border-zinc-600">
        <span class="absolute inset-y-0 right-4 flex items-center">
          <img src="https://cdn-icons-png.flaticon.com/512/6073/6073873.png" alt="user icon" aria-hidden="true" width="20" height="20">
        </span>
      </div>
      <div class="relative">
        <input type="email" placeholder="Correo Electronico" class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-teal-500 dark:bg-zinc-700 dark:border-zinc-600">
        <span class="absolute inset-y-0 right-4 flex items-center">
          <img src="https://www.tec-innova.mx/wp-content/uploads/2022/02/CORREO.png" alt="email icon" aria-hidden="true" width="20" height="20">
        </span>
      </div>
      <div class="relative">
        <input type="password" placeholder="Contraseña" class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-teal-500 dark:bg-zinc-700 dark:border-zinc-600">
        <span class="absolute inset-y-0 right-4 flex items-center">
          <img src="https://previews.123rf.com/images/faysalfarhan/faysalfarhan1602/faysalfarhan160200828/52257151-candado-icono-de-bot%C3%B3n-redondo-de-color-azul-brillante-cian.jpg" alt="lock icon" aria-hidden="true"width="20" height="20">
        </span>
      </div>
      <div class="flex items-center">
        <input type="checkbox" id="Recordar Usuario" class="h-4 w-4 text-teal-500 focus:ring-teal-400 border-zinc-300 rounded">
        <label for="remember" class="ml-2 block text-sm text-zinc-900 dark:text-zinc-300">Recordar Usuario</label>
      </div>
      <button type="submit" class="w-full bg-teal-500 text-white py-2 rounded-lg font-semibold hover:bg-teal-600 focus:outline-none focus:ring-2 focus:ring-teal-400">Continuar</button>
    </form>
  </div>
</div>
  </body>
</html>
